<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All Products — ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="products">

    <nav class="navbar">
        <a href="index.html" class="nav-brand">ShopEase</a>
        <button class="mobile-toggle">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html" class="active">Shop</a></li>
            <li><a href="cart.html" class="nav-cart">🛒 <span class="cart-badge" id="cartBadge"
                        style="display:none">0</span></a></li>
            <li id="authLinks"><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Our Products</h1>
            <p>Browse our curated collection</p>
        </div>
    </div>

    <section class="products-section" style="padding-top:0">
        <div class="container">
            <!-- Filters -->
            <div class="filter-bar">
                <div class="search-box">
                    <span class="icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search products..." oninput="loadProducts()">
                </div>
                <select id="categoryFilter" onchange="loadProducts()">
                    <option value="">All Categories</option>
                    <!-- Populated by JS -->
                </select>
                <select id="sortSelect" onchange="loadProducts()">
                    <option value="">Sort: Default</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                    <option value="newest">Newest First</option>
                </select>
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="productsGrid">
                <div class="spinner"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 ShopEase. Built with ❤️ using Java, MySQL & JavaScript.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
