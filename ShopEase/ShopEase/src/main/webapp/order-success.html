<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success — ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .success-card {
            background: var(--bg-card);
            padding: 60px 40px;
            border-radius: var(--radius-lg);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: var(--shadow-xl);
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        .success-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-light);
        }

        .order-id-badge {
            background: rgba(167, 139, 250, 0.1);
            color: var(--accent-light);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body data-page="order-success">
    <nav class="navbar">
        <a href="index.html" class="nav-brand">ShopEase</a>
    </nav>

    <div class="success-page">
        <div class="success-card fade-in">
            <div class="success-icon">✨</div>
            <h1>Order Placed!</h1>
            <p>Thank you for shopping with us. Your premium items are being prepared for shipment.</p>

            <div class="order-id-badge" id="orderIdBadge">Order #000</div>

            <div class="btn-group">
                <button id="viewInvoiceBtn" class="btn btn-primary">📄 Generate Invoice (PDF)</button>
                <a href="orders.html" class="btn btn-secondary">Track Order History</a>
                <a href="products.html" style="margin-top: 10px; color: var(--text-muted); font-size: 0.9rem;">Continue
                    Shopping</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('orderIdBadge').textContent = `Order #${id}`;
            document.getElementById('viewInvoiceBtn').addEventListener('click', () => {
                window.location.href = `invoice.html?id=${id}`;
            });
        });
    </script>
</body>

</html>
