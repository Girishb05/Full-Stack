<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="register">

    <nav class="navbar">
        <a href="index.html" class="nav-brand">ShopEase</a>
        <button class="mobile-toggle">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="cart.html" class="nav-cart">🛒 <span class="cart-badge" id="cartBadge"
                        style="display:none">0</span></a></li>
            <li id="authLinks"><a href="register.html" class="active">Register</a></li>
        </ul>
    </nav>

    <div class="auth-page">
        <div class="auth-card fade-in">
            <h1>Create Account</h1>
            <p class="subtitle">Join ShopEase for the best shopping experience</p>

            <div id="formError"
                style="display:none;background:rgba(239,68,68,0.1);border:1px solid var(--danger);color:var(--danger);padding:10px 16px;border-radius:var(--radius-md);margin-bottom:1rem;font-size:0.9rem;text-align:center">
            </div>

            <form onsubmit="register(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a password" minlength="6"
                        autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number (Optional)</label>
                    <input type="tel" id="phone" placeholder="9876543210" autocomplete="tel">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
