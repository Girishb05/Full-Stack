<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice — ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .invoice-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--bg-card);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: var(--shadow-lg);
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .invoice-title {
            text-align: right;
        }

        .invoice-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: var(--accent-light);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .detail-block h4 {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .detail-block p {
            font-weight: 500;
            line-height: 1.4;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        .invoice-table th {
            text-align: left;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .invoice-table td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .invoice-footer {
            display: flex;
            justify-content: flex-end;
        }

        .totals-table {
            width: 250px;
        }

        .totals-table div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .totals-table .grand-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-light);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            margin-top: 5px;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        @media print {
            body {
                background: white;
                color: black;
            }

            .invoice-container {
                margin: 0;
                padding: 0;
                box-shadow: none;
                border: none;
                max-width: 100%;
                background: white;
                color: black;
            }

            .invoice-container * {
                color: black !important;
                border-color: #ddd !important;
            }

            .actions,
            .navbar,
            .footer {
                display: none !important;
            }

            .invoice-header {
                border-bottom: 2px solid black;
            }
        }
    </style>
</head>

<body data-page="invoice">

    <div class="container">
        <div class="invoice-container" id="invoice">
            <div class="invoice-header">
                <div>
                    <h2 class="nav-brand" style="margin-bottom: 10px;">ShopEase</h2>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Premium E-Commerce Experience</p>
                </div>
                <div class="invoice-title">
                    <h1>INVOICE</h1>
                    <p id="invNo">#INV-0000</p>
                    <p id="invDate">Date: --/--/----</p>
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-block">
                    <h4>Customer Details</h4>
                    <p id="custName">---</p>
                    <p id="custEmail">---</p>
                    <p id="custPhone">---</p>
                </div>
                <div class="detail-block">
                    <h4>Shipping Address</h4>
                    <p id="shipAddr">---</p>
                    <div style="margin-top: 20px;">
                        <h4>Expected Delivery</h4>
                        <p id="expDelivery" style="color: var(--accent-light); font-weight: 600;">---</p>
                    </div>
                </div>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th style="text-align: right;">Total</th>
                    </tr>
                </thead>
                <tbody id="invoiceItems">
                    <!-- Items will be loaded here -->
                </tbody>
            </table>

            <div class="invoice-footer">
                <div class="totals-table">
                    <div>
                        <span>Subtotal:</span>
                        <span id="subTotal">₹0</span>
                    </div>
                    <div>
                        <span>Tax (5% GST):</span>
                        <span id="taxAmount">₹0</span>
                    </div>
                    <div>
                        <span>Shipping Charges:</span>
                        <span id="shippingCharges">₹0</span>
                    </div>
                    <div class="grand-total">
                        <span>Total Payable:</span>
                        <span id="grandTotal">₹0</span>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button onclick="window.print()" class="btn btn-primary">🖨️ Print / Save PDF</button>
                <button onclick="window.location.href='orders.html'" class="btn btn-secondary">Back to Orders</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Inline logic for invoice page
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            try {
                const resp = await fetch(`api/orders/invoice?id=${id}`);

                if (!resp.ok) {
                    if (resp.status === 401) throw new Error('You must be logged in to view this invoice.');
                    if (resp.status === 403) throw new Error('You do not have permission to view this invoice.');
                    if (resp.status === 404) throw new Error('Order not found.');
                    throw new Error(`Server returned error: ${resp.status}`);
                }

                const data = await resp.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                const { order, user } = data;

                // Populate elements
                document.getElementById('invNo').textContent = `#ORD-${order.id}`;
                document.getElementById('invDate').textContent = `Date: ${new Date(order.createdAt).toLocaleDateString()}`;

                document.getElementById('custName').textContent = user.name;
                document.getElementById('custEmail').textContent = user.email;
                document.getElementById('custPhone').textContent = user.phone || 'N/A';
                document.getElementById('shipAddr').textContent = order.shippingAddress;
                document.getElementById('expDelivery').textContent = order.expectedDeliveryDate ?
                    new Date(order.expectedDeliveryDate).toLocaleDateString() : '3-5 Business Days';

                const itemsHtml = order.items.map(it => `
                    <tr>
                        <td>${it.productName}</td>
                        <td>₹${it.price.toLocaleString()}</td>
                        <td>${it.quantity}</td>
                        <td style="text-align: right; font-weight: 600;">₹${(it.price * it.quantity).toLocaleString()}</td>
                    </tr>
                `).join('');
                document.getElementById('invoiceItems').innerHTML = itemsHtml;

                const itemsSubtotal = order.items.reduce((acc, it) => acc + (it.price * it.quantity), 0);
                const tax = itemsSubtotal * 0.05;
                const shipping = order.shippingCharges || 0;
                const grandTotal = order.totalAmount;

                document.getElementById('subTotal').textContent = `₹${itemsSubtotal.toLocaleString()}`;
                document.getElementById('taxAmount').textContent = `₹${tax.toLocaleString()}`;
                document.getElementById('shippingCharges').textContent = `₹${shipping.toLocaleString()}`;
                document.getElementById('grandTotal').textContent = `₹${grandTotal.toLocaleString()}`;

            } catch (e) {
                console.error('Failed to load invoice', e);
                document.body.innerHTML = `
                    <div style="text-align:center; padding: 100px 20px;">
                        <h1 style="color:var(--danger)">Error Loading Invoice</h1>
                        <p style="color:var(--text-muted)">${e.message}</p>
                        <a href="orders.html" class="btn btn-secondary" style="margin-top:20px">Go to My Orders</a>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
