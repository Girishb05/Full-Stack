<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="login">

    <nav class="navbar">
        <a href="index.html" class="nav-brand">ShopEase</a>
        <button class="mobile-toggle">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="cart.html" class="nav-cart">🛒 <span class="cart-badge" id="cartBadge"
                        style="display:none">0</span></a></li>
            <li id="authLinks"><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>

    <div class="auth-page">
        <div class="auth-card fade-in">
            <h1>Welcome Back</h1>
            <p class="subtitle">Login to access your cart & orders</p>

            <div id="formError"
                style="display:none;background:rgba(239,68,68,0.1);border:1px solid var(--danger);color:var(--danger);padding:10px 16px;border-radius:var(--radius-md);margin-bottom:1rem;font-size:0.9rem;text-align:center">
            </div>

            <form onsubmit="login(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password"
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>

            <div
                style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.06);text-align:center">
                <p style="color:var(--text-muted);font-size:0.8rem">
                    Demo: admin@shopease.com / admin123<br>
                    Customer: manoj@example.com / customer123
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
