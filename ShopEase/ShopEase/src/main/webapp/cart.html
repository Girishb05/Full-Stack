<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="cart">

    <nav class="navbar">
        <a href="index.html" class="nav-brand">ShopEase</a>
        <button class="mobile-toggle">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="cart.html" class="nav-cart active">🛒 <span class="cart-badge" id="cartBadge"
                        style="display:none">0</span></a></li>
            <li id="authLinks"><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Shopping Cart</h1>
            <p>Your items are saved across sessions — powered by MySQL</p>
        </div>
    </div>

    <section style="padding-bottom:80px">
        <div class="container">
            <div class="cart-layout">
                <div class="cart-items" id="cartItems">
                    <div class="spinner"></div>
                </div>
                <!-- Added Selective Order Controls -->
                <div id="cartControls" style="display:none; margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="selectAll" checked onchange="toggleSelectAll(this.checked)">
                        Select All
                    </label>
                </div>
                <div class="cart-summary" id="cartSummary">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 ShopEase. Built with ❤️ using Java, MySQL & JavaScript.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
